name: tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-groups
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format check
        run: uv run ruff format --check --diff .
      - name: ty
        run: uv run ty check django_ag_ui

  docs:
    name: docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install with docs group
        run: uv sync --all-groups
      - name: mkdocs build --strict
        run: DJANGO_SETTINGS_MODULE=tests.conftest_settings uv run mkdocs build --strict

  test:
    name: ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        django-version: ["4.2", "5.0", "5.1", "5.2", "6.0"]
        exclude:
          # Django 4.2 supports Python 3.8–3.12
          - python-version: "3.13"
            django-version: "4.2"
          - python-version: "3.14"
            django-version: "4.2"
          # Django 5.0 supports Python 3.10–3.12
          - python-version: "3.13"
            django-version: "5.0"
          - python-version: "3.14"
            django-version: "5.0"
          # Django 5.1 supports Python 3.10–3.13
          - python-version: "3.14"
            django-version: "5.1"
          # Django 6.0 requires Python 3.12+
          - python-version: "3.10"
            django-version: "6.0"
          - python-version: "3.11"
            django-version: "6.0"

    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dev deps
        run: uv sync --all-groups --python ${{ matrix.python-version }}
      - name: Pin Django ${{ matrix.django-version }}
        run: uv pip install --reinstall-package django "django~=${{ matrix.django-version }}.0"
      - name: pytest
        run: |
          uv run --no-sync pytest \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-py${{ matrix.python-version }}-django${{ matrix.django-version }}
          path: |
            coverage.xml
            htmlcov/
          if-no-files-found: ignore

  secrets:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/
      - name: Scan repo + history
        run: gitleaks git --redact --no-banner .

  tests-passed:
    name: tests
    if: always()
    needs: [lint, docs, test]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "a required job failed"; exit 1
          fi
